version: 1
description: >
  TDD fixture manifest for Phase 1 mapper. Each entry points the mapper at a
  source seed and records the expected mid-layer row count so the validator can
  flag silent drops.

seeds:
  - id: stripe.acme-co.invoices.sample_1
    source: stripe
    company_id: acme-co
    table: invoices
    path: seeds/stripe/acme-co/invoices/sample_1.csv
    expected_output: seeds/stripe/acme-co/invoices/expected/sample_1.csv
    record_count: 3
    expected_unified_rows: 3
    expected_rejects: 0
    known_edge_cases:
      - amounts_in_cents
      - currency_lowercase
      - unix_timestamps
      - id_has_in_prefix

  - id: stripe.acme-co.invoices.sample_dirty
    source: stripe
    company_id: acme-co
    table: invoices
    path: seeds/stripe/acme-co/invoices/sample_dirty.csv
    expected_output: seeds/stripe/acme-co/invoices/expected/sample_dirty.csv
    record_count: 3
    expected_unified_rows: 2
    expected_rejects: 1
    known_edge_cases:
      - extra_source_column_legacy_flag
      - row_missing_amount
      - unknown_status_value
      - non_ascii_characters

  - id: stripe.acme-co.customers.sample_1
    source: stripe
    company_id: acme-co
    table: customers
    path: seeds/stripe/acme-co/customers/sample_1.csv
    expected_output: seeds/stripe/acme-co/customers/expected/sample_1.csv
    record_count: 3
    expected_unified_rows: 3
    expected_rejects: 0
    known_edge_cases:
      - missing_phone
      - mixed_currency

  - id: google_sheets.acme-co.contacts.sample_1
    source: google_sheets
    company_id: acme-co
    table: contacts
    path: seeds/google_sheets/acme-co/contacts/sample_1.csv
    expected_output: seeds/google_sheets/acme-co/contacts/expected/sample_1.csv
    record_count: 3
    expected_unified_rows: 3
    expected_rejects: 0
    known_edge_cases:
      - banner_row_before_header
      - blank_spacer_row
      - freeform_phone

  - id: google_sheets.acme-co.contacts.sample_dirty
    source: google_sheets
    company_id: acme-co
    table: contacts
    path: seeds/google_sheets/acme-co/contacts/sample_dirty.csv
    expected_output: seeds/google_sheets/acme-co/contacts/expected/sample_dirty.csv
    record_count: 3
    expected_unified_rows: 2
    expected_rejects: 1
    known_edge_cases:
      - missing_last_name
      - missing_email
      - non_ascii_characters
      - unparseable_last_touch_date
      - extra_notes_column
